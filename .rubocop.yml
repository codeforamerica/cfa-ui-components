inherit_gem: { standard: config/base.yml }

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false

# Enforce Ruby 3.1+ hash value omission shorthand (foo: instead of foo: foo)
Style/HashSyntax:
  EnforcedShorthandSyntax: always
