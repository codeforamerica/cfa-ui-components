en:
  # Strings rendered by the components themselves. Namespaced under `cfaui` so
  # they never collide with a host application's own top-level locale keys.
  cfaui:
    base:
      optional: optional
    back_button:
      label: Go back
    submit_button:
      label: Continue
    tin:
      show: Show
      visible: TIN visible
      hidden: TIN hidden for security
    modal:
      close_aria: Close modal
    yes_no:
      "yes": "Yes"
      "no": "No"
      unsure: I don't know
    combobox:
      placeholder_label: "- Select or Type -"
      no_results: No results found
    memorable_date:
      day: Day
      month: Month
      year: Year
      month_select: "- Select -"
    select:
      placeholder: "- Select -"
  # Standard Rails key — the date picker reads this so it inherits whatever
  # month names the host app (or Active Support) already defines. Do NOT move
  # this under `cfaui`.
  date:
    month_names: [~, January, February, March, April, May, June, July, August, September, October, November, December]
  # Demo-only strings used by Lookbook previews. Never shipped to end users and
  # not part of the translation deliverable.
  preview:
    date_of_birth: Date of birth
    date_helper_text: "For example: August 28, 1986"
    first_name: First name
    last_name: Last name
    email: Email
    my_number: My Number
    ssn: Social Security Number or ITIN
    ssn_help: For example, 123-45-6789
    favorite_fruits: Favorite fruits
    fruit_help_text: Please choose your favorite fruit
    decline: Decline
    remove: Remove
    submit: Submit
